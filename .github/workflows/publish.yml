name: Render and Publish

on:
  push:
    branches: main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
      
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::downlit
            any::xml2
            any::here
            any::rio
            any::tidyverse
            any::palmerpenguins
            any::psych
            any::sjPlot
            any::lsr
            any::kableExtra
            any::patchwork
            any::ggstatsplot
            any::janitor
            any::emmeans
            any::broom
            any::gapminder
            any::psychTools
            any::ggpubr
            any::easystats
            any::gganimate
            any::pwr
            any::transformr
            any::gifski
          cache-version: 1
          needs: website

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
